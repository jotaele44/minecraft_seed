# WorldPainter CLI import configuration
# ======================================
# Use with WorldPainter command-line interface:
#
#   worldpainter -import output/heightmap/puerto_rico_heightmap.png \
#                --config output/worldpainter/worldpainter_import.properties
#
# Or for 16-bit heightmap (better vertical resolution):
#
#   worldpainter -import output/heightmap/puerto_rico_heightmap_16bit.png \
#                --config output/worldpainter/worldpainter_import.properties
#
# Note: exact CLI flag names depend on your installed WorldPainter version.
# Consult: https://www.worldpainter.net/trac/wiki/CommandLineUsage

heightMapFile=output/heightmap/puerto_rico_heightmap.png
waterLevel=62
maxHeight=255
smoothTerrain=false
mappingType=LINEAR
worldType=SURFACE

# Minecraft version compatibility:
# pre-1.18:  waterLevel=62  maxHeight=255
# 1.18+:     waterLevel=63  maxHeight=384  (update values above accordingly)

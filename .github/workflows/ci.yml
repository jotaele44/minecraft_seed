name: Pipeline CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  pipeline:
    name: Build & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PR_Minecraft_World

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: PR_Minecraft_World/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch DEM (uses synthetic fallback — no network required)
        run: python tools/fetch_dem.py

      - name: Build heightmap
        run: python tools/build_heightmap.py

      - name: Validate outputs
        run: python tools/validate_outputs.py

      - name: Generate preview
        run: python tools/preview_heightmap.py

      - name: Run test suite
        run: python -m pytest tests/ -v

      - name: Upload heightmap artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: puerto-rico-heightmap
          path: |
            PR_Minecraft_World/output/heightmap/puerto_rico_heightmap.png
            PR_Minecraft_World/output/heightmap/puerto_rico_preview.png
            PR_Minecraft_World/output/heightmap/heightmap_metadata.json
          retention-days: 30
